apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  selector:
    matchLabels: {app: backend}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  template:
    metadata:
      labels: {app: backend}
    spec:
      # המתנה שה-MySQL יאזין על 3306 (מונע ריסטרטים מיותרים)
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done"]
      containers:
        - name: backend
          image: david817/book-review-backend:c6b9b9b
          imagePullPolicy: Always
          ports: [{containerPort: 8080}]
          env:
            - {name: SPRING_DATASOURCE_URL, value: "jdbc:mysql://mysql:3306/book_review?allowPublicKeyRetrieval=true&useSSL=false"}
            - {name: SPRING_DATASOURCE_USERNAME, value: "user"}
            - {name: SPRING_DATASOURCE_PASSWORD, value: "password"}
          # זמן סטארט-אפ נדיב לפני ששופטים את הקונטיינר
          startupProbe:
            httpGet: {path: /actuator/health/liveness, port: 8080}
            periodSeconds: 5
            failureThreshold: 24 # ~120s
          # לייבנס לא בודק DB (שומר על יציבות)
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 10
          # רדינס כן בודק DB
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: 8080}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "512Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector: {app: backend}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
  template:
    spec:
      containers:
        - image: david817/book-review-backend:c6b9b9b
