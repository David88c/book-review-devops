apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: backend }
    spec:
      # מחכים ל-MySQL לפני שהאפליקציה תתחיל
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done",
            ]
      containers:
        - name: backend
          image: david817/book-review-backend:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8080 }]
          env:
            - {
                name: SPRING_DATASOURCE_URL,
                value: "jdbc:mysql://mysql:3306/book_review?allowPublicKeyRetrieval=true&useSSL=false",
              }
            - { name: SPRING_DATASOURCE_USERNAME, value: "user" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "password" }
          startupProbe:
            httpGet:
              path: /actuator/health # נשאר health (לא readiness/liveness)
              port: 8080
            initialDelaySeconds: 20 # תן 20 שניות שקט לפני הבדיקות
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30 # עד ~150s לפני שמכריזים כישלון

          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2

          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector: { app: backend }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
  template:
    spec:
      containers: []
