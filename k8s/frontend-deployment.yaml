apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 3
  selector:
    matchLabels: {app: frontend}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  template:
    metadata:
      labels: {app: frontend}
    spec:
      containers:
        - name: frontend
          image: david817/book-review-frontend:fda1135
          imagePullPolicy: Always
          ports: [{containerPort: 80}]
          readinessProbe:
            httpGet: {path: "/", port: 80}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: "/", port: 80}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: {cpu: "50m", memory: "64Mi"}
            limits: {cpu: "300m", memory: "256Mi"}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector: {app: frontend}
  ports:
    - name: http
      port: 80
      targetPort: 80 # <<< שים לב: 80 (תאם ל-Nginx)
  type: NodePort
  template:
    spec:
      containers:
        - image: david817/book-review-frontend:fda1135
