name: CI-CD via PR (build images + bump k8s)

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

env:
  DOCKER_USER: david817

jobs:
  build-push-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive short SHA
        id: short-sha
        shell: bash
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }} # הגדר בריפו

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/book-review-backend:${{ env.SHORT_SHA }}
            ${{ env.DOCKER_USER }}/book-review-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/book-review-frontend:${{ env.SHORT_SHA }}
            ${{ env.DOCKER_USER }}/book-review-frontend:latest

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump tags in manifests
        run: |
          yq -i '.spec.template.spec.containers[0].image = env(DOCKER_USER) + "/book-review-backend:" + env(SHORT_SHA)' k8s/backend-deployment.yaml
          yq -i '.spec.template.spec.containers[0].image = env(DOCKER_USER) + "/book-review-frontend:" + env(SHORT_SHA)' k8s/frontend-deployment.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "CD: bump images to ${{ env.SHORT_SHA }}"
          title: "CD: bump images to ${{ env.SHORT_SHA }}"
          body: |
            - backend  → `${{ env.DOCKER_USER }}/book-review-backend:${{ env.SHORT_SHA }}`
            - frontend → `${{ env.DOCKER_USER }}/book-review-frontend:${{ env.SHORT_SHA }}`
          branch: "ci/bump-images-${{ env.SHORT_SHA }}"
          labels: "cd, automated"
          delete-branch: true
