name: CI-CD (build images + bump manifests)

on:
  push:
    branches: ["main"]
    # אופציונלי: תרצה להריץ רק כשקבצי קוד משתנים?
    # paths:
    #   - "backend/**"
    #   - "frontend/**"

permissions:
  contents: write # מאפשר ל-workflow לעשות commit לקבצים

env:
  DOCKER_USER: david817 # ⬅️ שנה אם צריך

jobs:
  build-push-and-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive short SHA
        id: short-sha
        shell: bash
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }} # ⬅️ הגדר Secret בריפו

      # --- Build & Push BACKEND ---
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/book-review-backend:${{ env.SHORT_SHA }}
            ${{ env.DOCKER_USER }}/book-review-backend:latest

      # --- Build & Push FRONTEND ---
      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/book-review-frontend:${{ env.SHORT_SHA }}
            ${{ env.DOCKER_USER }}/book-review-frontend:latest

      # --- Install yq to edit YAMLs cleanly ---
      - name: Install yq (v4)
        run: |
          YQ_VERSION=v4.44.3
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      # --- Bump image tags in k8s manifests ---
      - name: Bump backend image tag
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER || 'david817' }}
          SHORT_SHA: ${{ steps.short-sha.outputs.sha }}
        shell: bash
        run: |
          TAG="${SHORT_SHA:-latest}"
          IMAGE="${DOCKER_USER}/book-review-backend:${TAG}"
          yq e -i '(.spec.template.spec.containers[].image) = strenv(IMAGE)' k8s/backend-deployment.yaml

      - name: Bump frontend image tag
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER || 'david817' }}
          SHORT_SHA: ${{ steps.short-sha.outputs.sha }}
        shell: bash
        run: |
          TAG="${SHORT_SHA:-latest}"
          IMAGE="${DOCKER_USER}/book-review-frontend:${TAG}"
          yq e -i '(.spec.template.spec.containers[].image) = strenv(IMAGE)' k8s/frontend-deployment.yaml

      # --- Commit & push manifest changes (triggers ArgoCD sync) ---
      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "CD: bump images to ${{ steps.short-sha.outputs.sha }}"
            git push
          fi
